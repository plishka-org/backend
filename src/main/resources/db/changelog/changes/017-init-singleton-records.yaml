databaseChangeLog:
  - changeSet:
      id: PLIS-181-init-singletons
      author: plishka-backend
      changes:
        - insert:
            tableName: home_page_content
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: title
                  value: 'Автентичні вироби з дерева ручної роботи'
              - column:
                  name: description
                  value: 'Коротка інформація про майстерню. Зв''яжіться з нами для замовлення!'
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP(6)
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP(6)

        - insert:
            tableName: about_page_content
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: history_title
                  value: 'PLISHKA — ЦЕ ІСТОРІЯ, ЩО ПОЧАЛАСЯ З ДЕРЕВА'
              - column:
                  name: history_text
                  value: 'Назва бренду народилася у 2022 році — прямо під час роботи над терасою. Стоячи на даху разом із командою, ми шукали слово, яке б передавало суть нашої справи: любов до дерева, майстерність і увагу до деталей. Ми хотіли, щоб назва звучала легко, запам’ятовувалась і однаково гарно сприймалась українською та англійською. Так з’явилась Plishka — від слова «плішка», що означає тріску дерева, базовий елемент, з якого починається щось більше.'
              - column:
                  name: current_title
                  value: 'PLISHKA — СЬОГОДНІ'
              - column:
                  name: current_text
                  value: 'Сьогодні Plishka — це не просто майстерня. Це про створення виробів із характером: натуральних, довговічних і продуманих до дрібниць. Кожен наш проєкт — це баланс естетики, функціональності та ручної роботи.'
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP(6)
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP(6)

        - insert:
            tableName: contacts_page
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: phone_number
                  value: '+380000000000'
              - column:
                  name: email
                  value: 'team@plishka.com.ua'
              - column:
                  name: address
                  value: 'Косівщина, Україна'
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP(6)
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP(6)

        - insert:
            tableName: system_settings
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: is_shop_mode_enabled
                  valueBoolean: false
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP(6)
              - column:
                  name: updated_at
                  valueComputed: CURRENT_TIMESTAMP(6)
