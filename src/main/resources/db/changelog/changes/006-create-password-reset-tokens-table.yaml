databaseChangeLog:
  - changeSet:
      id: 006-create-password-reset-tokens-table
      author: codex
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: password_reset_token_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_password_reset_tokens
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: password_reset_tokens
            columnNames: token_hash
            constraintName: uk_password_reset_tokens_token_hash
        - addUniqueConstraint:
            tableName: password_reset_tokens
            columnNames: user_id
            constraintName: uk_password_reset_tokens_user
        - addForeignKeyConstraint:
            baseTableName: password_reset_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_password_reset_tokens_user
            onDelete: CASCADE
        - createIndex:
            tableName: password_reset_tokens
            indexName: idx_password_reset_tokens_expires_at
            columns:
              - column:
                  name: expires_at
