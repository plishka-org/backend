databaseChangeLog:
  - changeSet:
      id: PLIS-179-create-reviews
      author: plishka-backend
      changes:
        - createTable:
            tableName: reviews
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: author_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_approved
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: is_featured
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: reviews
            indexName: idx_reviews_created_at
            columns:
              - column:
                  name: created_at
                  descending: true
        - addForeignKeyConstraint:
            baseTableName: reviews
            baseColumnNames: user_id
            constraintName: fk_reviews_user
            referencedTableName: users
            referencedColumnNames: user_id
            onDelete: SET NULL
