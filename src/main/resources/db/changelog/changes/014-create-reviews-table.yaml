databaseChangeLog:
  - changeSet:
      id: PLIS-179-create-reviews
      author: plishka-backend
      changes:
        - createTable:
            tableName: reviews
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: author_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_featured
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: reviews
            indexName: idx_reviews_created_at
            columns:
              - column:
                  name: created_at
                  descending: true
        - createIndex:
            tableName: reviews
            indexName: idx_reviews_is_featured_created_at
            columns:
              - column:
                  name: is_featured
              - column:
                  name: created_at
                  descending: true
