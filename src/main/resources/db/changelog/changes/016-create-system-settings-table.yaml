databaseChangeLog:
  - changeSet:
      id: PLIS-180-create-system-settings
      author: plishka-backend
      changes:
        - createTable:
            tableName: system_settings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: is_shop_mode_enabled
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE system_settings ADD CONSTRAINT chk_system_settings_singleton CHECK (id = 1);
