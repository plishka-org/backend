databaseChangeLog:
  - changeSet:
      id: PLIS-179-create-review-media
      author: plishka-backend
      changes:
        - createTable:
            tableName: review_media
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: review_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: s3_key
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: media_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: display_order
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: review_media
            indexName: idx_review_media_review_id
            columns:
              - column:
                  name: review_id
        - addForeignKeyConstraint:
            baseTableName: review_media
            baseColumnNames: review_id
            constraintName: fk_review_media_review
            referencedTableName: reviews
            referencedColumnNames: id
            onDelete: CASCADE
        - sql:
            sql: ALTER TABLE review_media ADD CONSTRAINT chk_review_media_type CHECK (media_type IN ('IMAGE', 'VIDEO'));
